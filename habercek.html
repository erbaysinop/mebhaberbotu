<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>MEB Gelişmiş Haber Manşet Botu</title>    
    
    <link rel="stylesheet" href="owl.carousel.min.css">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        #eb-slider, .owl-stage-outer, .owl-item, .item { height: 100vh !important; }
        .item { position: relative; background: #000; display: flex; align-items: flex-start; justify-content: center; height: 100vh; }
        .item img { width: 100%; height: 100% !important; object-fit: cover; display: block; }

        .eb-cap {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 140px 40px 40px; 
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.85) 45%, transparent 100%);
            color: #fff; pointer-events: none;
            display: flex; flex-direction: column;
            z-index: 10;
        }

        .eb-badge { display: flex; align-items: center; margin-bottom: 15px; width: fit-content; }
        
        .eb-cap span:not(.school-name-text):not(.news-label-text) { 
            font-size: 28px; font-weight: 700; line-height: 1.3; 
            text-shadow: 0 4px 12px rgba(0,0,0,1); display: block; 
            max-width: 1100px;
        }

        .news-label-text::before {
            content: ''; display: inline-block; width: 10px; height: 10px;
            background-color: #2ecc71; border-radius: 50%; margin-right: 8px;
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }

        @media (max-width: 640px) {
            .item { flex-direction: column; }
            .item img { height: 50vh !important; }
            .eb-cap { position: relative; padding: 20px; background: #000; height: 50vh; justify-content: flex-start; }
            .eb-cap span:not(.school-name-text):not(.news-label-text) { font-size: 20px !important; }
            .owl-nav { display: none !important; }
        }

        #loader { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: #d32f2f; border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .owl-nav button { position: absolute; top: 50%; transform: translateY(-50%); font-size: 40px !important; color: #fff !important; background: rgba(0,0,0,0.3) !important; width: 60px; height: 60px; border-radius: 50% !important; z-index: 100; }
        .owl-prev { left: 20px; } .owl-next { right: 20px; }
    </style>
</head>

<body>

<div id="loader"><div class="spinner"></div></div>
<div id="eb-slider" class="owl-carousel"></div>

<script src="jquery.min.js"></script>
<script src="owl.carousel.min.js"></script>

<script>
    const PROXY_URL = "https://script.google.com/macros/s/AKfycbz7Cur6ko0XCniwQyxdRfZ1AdUm0MQ4cLHLS2XKxGjEM1r83BAk8okzPY98UIPafVr9/exec?url=";
    let currentSchoolName = "OKUL ADI";
    let targetUrl = "https://sinop.meb.gov.tr"; 

    function checkUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        let link = urlParams.get('link') || urlParams.get('okul');
        if (link) {
            if (!link.startsWith('http')) link = 'https://' + link;
            targetUrl = link;
        }
    }

    function extractSchoolName(doc) {
        try {
            let title = doc.querySelector('title')?.innerText || "";
            if (!title) return "OKUL ADI";
            if (title.includes('-')) {
                let namePart = title.split('-')[1];
                if (namePart.includes('|')) namePart = namePart.split('|')[0];
                return namePart.trim();
            }
            return title.split('|')[0].trim();
        } catch(e) { return "OKUL ADI"; }
    }

    function fetchNews() {
        $('#loader').css('display', 'flex');
        const baseUrl = new URL(targetUrl).origin + '/';
        const finalRequestUrl = PROXY_URL + encodeURIComponent(targetUrl);

        fetch(finalRequestUrl)
            .then(response => response.text())
            .then(htmlContent => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlContent, 'text/html');
                currentSchoolName = extractSchoolName(doc);
                let results = [];
                const forbidden = ['logo', 'icon', 'sosyal', 'v3', 'favicon', 'banner', 'button', 'btn', 'social'];

                // MEB Özel Seçiciler
                const selviSlides = doc.querySelectorAll('.ws_images ul li');
                selviSlides.forEach(li => {
                    const img = li.querySelector('img, image');
                    let title = li.querySelector('span')?.innerText || li.getAttribute('title') || "";
                    if (img) {
                        let src = img.getAttribute('src') || img.getAttribute('xlink:href');
                        if (src && !forbidden.some(k => src.toLowerCase().includes(k))) {
                            results.push({ img: src, title: title });
                        }
                    }
                });

                if (results.length === 0) {
                    doc.querySelectorAll('.swiper-slide, .item, .manset-resim').forEach(el => {
                        const img = el.querySelector('img');
                        if (img) {
                            let src = img.getAttribute('src') || img.getAttribute('data-src');
                            let title = el.innerText || img.getAttribute('alt') || "";
                            if (src && src.includes('meb_iys_dosyalar') && title.length > 2) {
                                results.push({ img: src, title: title });
                            }
                        }
                    });
                }

                const uniqueResults = [];
                const seenUrls = new Set();
                for (let item of results) {
                    if (uniqueResults.length >= 10) break;
                    if (!seenUrls.has(item.img)) { seenUrls.add(item.img); uniqueResults.push(item); }
                }
                initSlider(uniqueResults, baseUrl);
            })
            .catch(() => { $('#loader').hide(); alert("Veri çekilemedi."); });
    }

    function initSlider(dataList, base) {
        const sliderContainer = $('#eb-slider');
        let finalHtml = '';
        dataList.forEach(newsItem => {
            let fullImg = newsItem.img.startsWith('http') ? newsItem.img : base + newsItem.img.replace(/^\//, '');
            finalHtml += `
                <div class="item">
                    <img src="${fullImg}" onerror="this.src='https://placehold.co/1200x800/111/fff?text=Görsel+Bulunamadı'">
                    <div class="eb-cap">
                        <div class="eb-badge" style="background:#fff; color:#000; padding:2px 10px; border-radius:4px;">
                            <span class="school-name-text" style="font-weight:800; font-size:11px;">${currentSchoolName}</span>
                            <span class="news-label-text" style="background:#d32f2f; color:#fff; padding:2px 8px; margin-left:10px; border-radius:2px; font-size:10px;">GÜNCEL HABERLER</span>
                        </div>
                        <span>${newsItem.title}</span>
                    </div>
                </div>`;
        });

        $('#loader').hide();
        sliderContainer.html(finalHtml).owlCarousel({
            items: 1, loop: true, autoplay: true, autoplayTimeout: 5500, nav: true, dots: false, animateOut: 'fadeOut', animateIn: 'fadeIn', navText: ["❮", "❯"]
        });
    }

    $(document).ready(function() {
        checkUrl();
        fetchNews();
    });
</script>
</body>
</html>
