<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>MEB Gelişmiş Haber Manşet Botu</title>
    <link rel="stylesheet" href="owl.carousel.min.css">
    <script src="jquery.min.js"></script>
    <script src="owl.carousel.min.js"></script>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <style>       
   
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        /* ÜST BAR */
        #eb-top-bar {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; gap: 8px; background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(15px); padding: 8px 15px; border-radius: 40px; 
            border: 1px solid rgba(255, 255, 255, 0.15); width: 90%; max-width: 450px;
            transition: opacity 0.5s ease; align-items: center;
        }

        input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 14px; text-align: center; }
        
        /* Butonlar */
        .btn-ara { background: #d32f2f; color: #fff; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; white-space: nowrap; }
        #btn-embed { background: rgba(255, 255, 255, 0.1); color: #fff; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; padding: 0; }

        /* POPUP TASARIMI */
        #eb-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 3000; background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #333; width: 90%; max-width: 400px; color: #fff; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #eb-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 2999; backdrop-filter: blur(5px); }
        #eb-code-area { width: 100%; height: 100px; background: #000; border: 1px solid #444; color: #0f0; font-family: monospace; font-size: 11px; padding: 10px; margin: 15px 0; border-radius: 8px; resize: none; outline: none; }

        /* ANA YERLEŞİM (Senin Orijinal CSS) */
        #eb-slider, .owl-stage-outer, .owl-item, .item { height: 100vh !important; }
        .item { position: relative; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .item img { width: 100%; height: 100% !important; object-fit: cover; }
        .eb-cap { position: absolute; bottom: 0; left: 0; right: 0; padding: 140px 40px 40px; background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.85) 45%, transparent 100%); color: #fff; pointer-events: none; display: flex; flex-direction: column; }
        .eb-badge { display: flex; align-items: center; margin-bottom: 15px; width: fit-content; animation: slideUp 0.5s ease; }
        .eb-cap span:not(.school-name-text):not(.news-label-text) { font-size: 28px; font-weight: 700; line-height: 1.3; text-shadow: 0 4px 12px rgba(0,0,0,1); display: block; max-width: 1100px; animation: slideUp 0.7s ease; }
        .news-label-text::before { content: ''; display: inline-block; width: 7px; height: 7px; background-color: #2ecc71; border-radius: 50%; margin-right: 6px; animation: pulse-green 2s infinite; }
        @keyframes pulse-green { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* MOBİL ÖZEL AYARLAR */
        @media (max-width: 640px) {
            #eb-top-bar { width: auto; max-width: 250px; padding: 6px 4px; }
            .item { flex-direction: column; align-items: flex-start; justify-content: flex-start; height: 100vh; }
            .item img { height: 55vh !important; object-fit: contain !important; margin-top: 20px; width: 100%; }
            .eb-cap { position: relative; margin-top: 30px; padding: 0 20px 20px; background: transparent; flex-grow: 1; }
            .eb-cap span:not(.school-name-text):not(.news-label-text) { font-size: 20px !important; text-shadow: none; line-height: 1.2; }
            .school-name-text { display: none !important; }
            .owl-nav button { display: none !important; }
        }

        #loader { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; align-items: center; justify-content: center; color: #fff; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: #d32f2f; border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .owl-nav button { position: absolute; top: 50%; transform: translateY(-50%); font-size: 35px !important; color: #fff !important; padding: 15px !important; background: rgba(0,0,0,0.2) !important; border-radius: 50%; }
        .owl-prev { left: 20px; } .owl-next { right: 20px; }
    </style>
</head>
<body>

<div id="eb-top-bar">
    <input type="text" id="targetUrl" placeholder="Okul URL..." value="https://sinop.meb.gov.tr">
    <button id="btn-embed" onclick="embedKoduAl()">&lt;&gt;</button>
    <button class="btn-ara" onclick="fetchNews()">HABER ARA</button>
</div>

<div id="eb-overlay" onclick="$('#eb-overlay, #eb-popup').fadeOut()"></div>
<div id="eb-popup">
    <span style="font-weight:bold; color:#d32f2f; display:block; margin-bottom:10px;">Embed Kodu</span>
    <textarea id="eb-code-area" readonly></textarea>
    
    <div style="display:flex; gap:10px;">
        <button class="btn-ara" style="flex:2;" onclick="kopyalaVeKapat()">KOPYALA</button>
        <button class="btn-ara" style="flex:1; background:#444;" onclick="sadeceKapat()">KAPAT</button>
    </div>
</div>

<div id="loader"><div class="spinner"></div></div>
<div id="eb-slider" class="owl-carousel"></div>

<script>
    const PROXY_URL = "https://script.google.com/macros/s/AKfycbz7Cur6ko0XCniwQyxdRfZ1AdUm0MQ4cLHLS2XKxGjEM1r83BAk8okzPY98UIPafVr9/exec?url=";
    let fadeTimeout;
    const topBar = $('#eb-top-bar');
    let currentSchoolName = "OKUL ADI";

    // --- EMBED FONKSİYONLARI ---
    function embedKoduAl() {
    let base = window.location.href.split('?')[0];
    let fullUrl = base.substring(0, base.lastIndexOf('/')) + "/habercek.html";    

    let link = $('#targetUrl').val();
    let code = `<iframe src="${fullUrl}?link=${link}" style="width:100%;height:100vh;border:none;" allowfullscreen></iframe>`;
    
    $('#eb-code-area').val(code);
    $('#eb-overlay, #eb-popup').fadeIn();
}
    function kopyalaVeKapat() {
    let copyText = document.getElementById("eb-code-area");   
    copyText.select();
    copyText.setSelectionRange(0, 99999); // Mobil cihazlar için
    navigator.clipboard.writeText(copyText.value);    
    $('#eb-overlay, #eb-popup').fadeOut();
}

function sadeceKapat() {
    $('#eb-overlay, #eb-popup').fadeOut();
}

    // --- SENİN ORİJİNAL ÇALIŞAN MANTIĞIN (DEĞİŞTİRİLMEDİ) ---
    function checkUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        let link = urlParams.get('link') || urlParams.get('okul');
        if (link) {
            if (!link.startsWith('http')) link = 'https://' + link;
            $('#targetUrl').val(link);
        }
    }

    function showTopBar() {
        topBar.css({'opacity': '1', 'visibility': 'visible'});
        clearTimeout(fadeTimeout);
        if (window.innerWidth > 768) {
            fadeTimeout = setTimeout(() => {
                if (!$('#targetUrl').is(':focus')) {
                    topBar.css('opacity', '0.35');
                }
            }, 10000);
        }
    }

    $(document).on('mousemove keydown scroll click', showTopBar);
    $('#targetUrl').on('focus', function() { $(this).select(); clearTimeout(fadeTimeout); topBar.css('opacity', '1'); });
    $('#targetUrl').on('keypress', function(e) { if (e.which == 13) fetchNews(); });

    function extractSchoolName(doc) {
        try {
            let title = doc.querySelector('title')?.innerText || "";
            if (!title) return "OKUL ADI";
            if (title.includes('-')) {
                let namePart = title.split('-')[1];
                if (namePart.includes('|')) namePart = namePart.split('|')[0];
                return namePart.trim();
            } else if (title.includes('|')) {
                return title.split('|')[0].trim();
            }
            return title.trim();
        } catch(e) { return "OKUL ADI"; }
    }

    function fetchNews() {
        let inputUrl = $('#targetUrl').val().trim();
        if (!inputUrl) return;
        if (!inputUrl.startsWith('http')) inputUrl = 'https://' + inputUrl;
        
        $('#loader').css('display', 'flex');
        const baseUrl = new URL(inputUrl).origin + '/';
        const finalRequestUrl = PROXY_URL + encodeURIComponent(inputUrl);

        fetch(finalRequestUrl)
            .then(response => response.text())
            .then(htmlContent => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlContent, 'text/html');
                
                currentSchoolName = extractSchoolName(doc);
                let results = [];
                const forbidden = ['logo', 'icon', 'sosyal', 'v3', 'favicon', 'banner', 'button', 'btn', 'social'];

                const selviSlides = doc.querySelectorAll('.ws_images ul li');
                selviSlides.forEach(li => {
                    const allImages = li.querySelectorAll('image, img');
                    let validImg = null;
                    let title = li.querySelector('span')?.innerText || li.getAttribute('title') || "";
                    allImages.forEach(img => {
                        const href = img.getAttribute('xlink:href') || img.getAttribute('src') || img.getAttribute('href');
                        if (href && (href.includes('meb_iys_dosyalar') || href.includes('resimler') || href.includes('upload'))) {
                            if (!forbidden.some(k => href.toLowerCase().includes(k))) validImg = href;
                        }
                    });
                    if (validImg && title.length > 2) results.push({ img: validImg, title: title });
                });

                if (results.length === 0) {
                    const imageEls = doc.querySelectorAll('#resim li img, #resim img, .swiper-slide img, .manset-resim img');
                    const textEls = doc.querySelectorAll('#yazi li, .swiper-slide .title, .news-title');
                    imageEls.forEach((img, index) => {
                        let src = img.getAttribute('src') || img.getAttribute('data-src');
                        if (src && (src.includes('meb_iys_dosyalar') || src.includes('resim') || src.includes('upload'))) {
                            let detectedTitle = textEls[index] ? textEls[index].innerText : (img.getAttribute('alt') || img.getAttribute('title') || "");
                            if (!forbidden.some(k => src.toLowerCase().includes(k)) && detectedTitle.length > 2) results.push({ img: src, title: detectedTitle });
                        }
                    });
                }

                if (results.length === 0) {
                    doc.querySelectorAll('li, .item, .slide, .swiper-slide').forEach(container => {
                        const img = container.querySelector('img');
                        if (img) {
                            let src = img.getAttribute('src') || img.getAttribute('data-src');
                            if (src && (src.includes('slider') || src.includes('manset') || src.includes('resim'))) {
                                let title = container.querySelector('h1, h2, h3, .title, span')?.innerText || img.getAttribute('alt') || "";
                                if (!forbidden.some(k => src.toLowerCase().includes(k)) && title.length > 2) results.push({ img: src, title: title });
                            }
                        }
                    });
                }

                const uniqueResults = [];
                const seenUrls = new Set();
                const limit = inputUrl.includes('meb.gov.tr') ? 10 : 5;
                for (let item of results) {
                    if (uniqueResults.length >= limit) break; 
                    if (!seenUrls.has(item.img)) { seenUrls.add(item.img); uniqueResults.push(item); }
                }
                initSlider(uniqueResults, baseUrl);
            })
            .catch(error => { $('#loader').hide(); alert("Veri çekilemedi."); });
    }

    function initSlider(dataList, base) {
        const sliderContainer = $('#eb-slider');
        sliderContainer.trigger('destroy.owl.carousel').empty();
        let finalHtml = '';
        let validItemCount = 0;

        dataList.forEach(newsItem => {
            if (!newsItem.img) return;
            let fullImageUrl = newsItem.img.startsWith('http') ? newsItem.img : base + newsItem.img.replace(/^\//, '');
            let displayTitle = (newsItem.title || "Manşet Haber").trim();
            if (displayTitle.toLowerCase() === "haber" || displayTitle.length < 2) displayTitle = "Haber Detayı İçin Tıklayınız";

            finalHtml += `<div class="item"><img src="${fullImageUrl}" onerror="this.src='https://placehold.co/1200x800/111/fff?text=Görsel+Bulunamadı'"><div class="eb-cap"><div class="eb-badge" style="background: #fff; color: #000; padding: 0 10px;"><span class="school-name-text" style="font-weight: 800; font-size: 11px;">${currentSchoolName}</span><span class="news-label-text" style="background: #d32f2f; color: #fff; padding: 4px 8px; margin-left: 10px; border-radius: 2px; font-size: 10px;">GÜNCEL HABERLER</span></div><span>${displayTitle}</span></div></div>`;
            validItemCount++;
        });

        $('#loader').hide();
        if (validItemCount > 0) {
            sliderContainer.html(finalHtml).owlCarousel({ items: 1, loop: (validItemCount > 1), autoplay: true, autoplayTimeout: 5500, nav: true, dots: false, animateOut: 'fadeOut', animateIn: 'fadeIn', smartSpeed: 900, navText: ["❮", "❯"] });
            showTopBar();
        } else { alert("İçerik bulunamadı."); }
    }

    $(document).ready(function() {
        checkUrl();
        showTopBar();
        fetchNews();
    });
</script>
</body>
</html>
